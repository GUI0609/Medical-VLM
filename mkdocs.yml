site_name: Medical-VLM
site_url: https://gui0609.github.io/Medical-VLM/
site_description: Medical-VLM 中文个人学习笔记
repo_url: https://github.com/GUI0609/Medical-VLM
repo_name: GUI0609/Medical-VLM
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 学习笔记:
      - notes/index.md
      - AI: notes/ai/index.md
      - 编程: notes/programming/index.md
      - 论文: notes/papers/index.md
      - 科研: notes/research/index.md
  - 博客:
      - blog/index.md
  - 标签: tags.md

plugins:
  - search:
      lang:
        - zh
        - en
  - blog:
      archive_date_format: yyyy年MM月
      categories_allowed:
        - AI
        - 编程
        - 论文
        - 科研
        - 学习日志
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

strict: true
